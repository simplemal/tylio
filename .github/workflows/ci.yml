name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Push successivi sullo stesso branch cancellano i job in coda dei commit
# precedenti. Senza questa policy, push ravvicinati lasciavano i job zombie
# in coda finché GitHub li timeoutava → run marcate "failure" senza log.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  php:
    name: PHP ${{ matrix.php }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        php: ['8.2', '8.3', '8.4']

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: pdo_sqlite, gd, zip, sodium, mbstring, fileinfo, json
          coverage: none
          tools: composer:v2

      - name: Cache composer
        uses: actions/cache@v4
        with:
          path: ~/.composer/cache
          key: composer-${{ matrix.php }}-${{ hashFiles('composer.lock') }}
          restore-keys: composer-${{ matrix.php }}-

      - name: Install dependencies
        run: composer install --no-interaction --no-progress --prefer-dist

      - name: PHPStan
        run: composer analyse

      - name: PHPUnit
        run: composer test

  admin-spa:
    name: Admin SPA build (Node ${{ matrix.node }})
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        node: ['20', '22']

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm
          cache-dependency-path: admin-src/package-lock.json

      - name: Install npm dependencies
        working-directory: admin-src
        run: npm ci

      - name: Type check
        working-directory: admin-src
        run: npx vue-tsc --noEmit

      - name: Production build
        working-directory: admin-src
        run: npm run build

      - name: Verify build output
        run: |
          test -f admin/index.html && echo "✓ admin/index.html generato"
          ls -la admin/assets/ | head -20
