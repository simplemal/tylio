<!doctype html>
<!-- `lang` is the boot fallback only — `main.ts` rewrites it at startup
     to whatever vue-i18n picks (navigator.language or the user's saved
     override in localStorage). -->
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#0f0d0a" />
    <title>tylio.app · admin</title>
    <!-- Favicon: bump the `?v=` when the logo changes to invalidate CDN cache. -->
    <link rel="icon" type="image/svg+xml" href="/logo.svg?v=2" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <!-- All the fonts the user can pick as heading/body on the site,
         loaded in admin for the "write the name in the font itself" preview
         in the Theme → Font section. Weight 500 is enough for the preview. -->
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600&family=Inter:wght@400;500;600&family=Playfair+Display:wght@500&family=DM+Sans:wght@500&family=IBM+Plex+Serif:wght@500&family=IBM+Plex+Sans:wght@500&family=Crimson+Pro:wght@500&family=Manrope:wght@500&family=Space+Grotesk:wght@500&family=Lora:wght@500&family=Sora:wght@500&family=Caveat:wght@500&family=Dancing+Script:wght@500&family=Pacifico&family=JetBrains+Mono:wght@500&family=IBM+Plex+Mono:wght@500&family=Space+Mono&display=swap" rel="stylesheet">
    <script src="https://code.iconify.design/iconify-icon/2.1.0/iconify-icon.min.js"></script>
  </head>
  <body class="bg-ink-950 text-ink-100 antialiased">
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
